<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KingsHelp - Restablecer contrasena</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg1: #f8f9ff;
        --bg2: #eef3ff;
        --card: #ffffff;
        --text: #1f2937;
        --muted: rgba(31, 41, 55, 0.6);
        --line: rgba(15, 23, 42, 0.12);
        --shadow: 0 28px 70px rgba(15, 23, 42, 0.14);
        --brand: #1b4490;
        --brand-2: #1f4e9e;
        --brand-glow: rgba(31, 78, 158, 0.18);
        --link: #1b8a76;
        --radius: 22px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
        color: var(--text);
        background: radial-gradient(900px 520px at 15% 10%, rgba(189, 203, 255, 0.45), transparent 60%),
                    radial-gradient(900px 520px at 85% 15%, rgba(213, 232, 255, 0.55), transparent 60%),
                    linear-gradient(180deg, var(--bg1), var(--bg2));
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; }
      .card {
        width: min(420px, 100%);
        background: linear-gradient(180deg, #ffffff 0%, #f6f7fb 100%);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 26px 24px;
        text-align: center;
      }
      .logo {
        width: 120px;
        max-width: 70%;
        margin: 2px auto 10px;
        display: block;
      }
      h1 { margin: 0 0 6px; font-size: 20px; line-height: 1.2; letter-spacing: -0.3px; }
      p { margin: 0 0 16px; color: var(--muted); line-height: 1.55; font-size: 14px; }
      form { text-align: left; }
      label { display: block; font-weight: 600; font-size: 12.5px; color: rgba(31, 41, 55, 0.7); margin: 8px 0 6px; }
      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        outline: none;
        font-size: 14px;
        color: var(--text);
      }
      input:focus {
        border-color: rgba(31, 78, 158, 0.4);
        box-shadow: 0 0 0 3px rgba(31, 78, 158, 0.18);
      }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
      button {
        width: 100%;
        border: none;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        color: #fff;
        padding: 12px 14px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 24px var(--brand-glow);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 16px 30px var(--brand-glow); }
      button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
      .msg { margin-top: 12px; font-size: 13px; text-align: center; }
      .msg.ok { color: #1b8a76; }
      .msg.bad { color: #7a271a; }
      .small { margin-top: 12px; font-size: 12px; color: rgba(31, 41, 55, 0.55); text-align: center; }
      a { color: var(--link); text-decoration: underline; }
      .legal { margin-top: 12px; font-size: 11px; color: rgba(31, 41, 55, 0.5); text-align: center; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card" role="main">
        <img class="logo" src="/img/LOGO_2.png" alt="KingsHelp" />
        <h1>Restablecer contrasena</h1>
        <p>Introduce una nueva contrasena. Este enlace caduca en 30 minutos.</p>

        <form>
          <label for="pw">Nueva contrasena</label>
          <input id="pw" type="password" autocomplete="new-password" placeholder="Min. 8 caracteres" />

          <div class="row">
            <button id="btn">Cambiar contrasena</button>
          </div>
        </form>

        <div id="msg" class="msg" aria-live="polite"></div>
        <div class="small"><a href="/">Volver a KingsHelp</a></div>
        <div class="legal">Sitio protegido por reCAPTCHA, la <a href="/legal/privacidad.html">Politica de Privacidad</a> y los
          <a href="/legal/terminos.html">Terminos del Servicio</a> de Google aplican.</div>
      </main>
    </div>

    <script src="reset-password.js"></script>
  </body>
</html>
