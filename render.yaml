services:
  - type: web
    name: kingshelp
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src
      - key: DB_PATH
        value: kingshelp.db

    preDeployCommand: >-
      node -e "process.exit(process.env.DATABASE_URL ? 0 : 1)" &&
      node src/db/migrate.pg.js &&
      node src/db/seed.pg.js ||
      (node src/db/migrate.js && node src/db/seed.js)
