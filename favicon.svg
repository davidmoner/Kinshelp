<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Pro tab mark: dark tile + crisp crown (reads at 16px) -->
    <linearGradient id="khBg" x1="8" y1="6" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1324"/>
      <stop offset="0.55" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#070A10"/>
    </linearGradient>

    <linearGradient id="khGold" x1="14" y1="10" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE6A3"/>
      <stop offset="0.38" stop-color="#D9B35B"/>
      <stop offset="0.72" stop-color="#B88A2E"/>
      <stop offset="1" stop-color="#8C5F14"/>
    </linearGradient>

    <radialGradient id="khGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(22 16) rotate(55) scale(44 34)">
      <stop offset="0" stop-color="#295AAD" stop-opacity="0.38"/>
      <stop offset="0.52" stop-color="#295AAD" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#295AAD" stop-opacity="0"/>
    </radialGradient>

    <filter id="khSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#khBg)"/>
  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#khGlow)"/>

  <!-- Crown (simplified, bold) -->
  <g filter="url(#khSoft)">
    <path fill="url(#khGold)" d="M13.3 43.2l6.0-23.6 12.7 12.0 12.7-12.0 6.0 23.6H13.3z"/>
    <rect x="13.3" y="43.2" width="37.4" height="6.1" rx="3.05" fill="url(#khGold)"/>
    <circle cx="20.2" cy="19.6" r="3.45" fill="url(#khGold)"/>
    <circle cx="32" cy="15.9" r="3.45" fill="url(#khGold)"/>
    <circle cx="43.8" cy="19.6" r="3.45" fill="url(#khGold)"/>
  </g>
</svg>
